<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code • Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background-image: 
                linear-gradient(rgba(30, 58, 138, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 58, 138, 0.035) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }

        .section-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(15 23 42 / 0.08), 0 2px 4px -2px rgb(15 23 42 / 0.08);
        }

        .qr-container {
            background: white;
            padding: 18px;
            border: 2px solid #1e3a8a;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgb(30 58 138 / 0.1);
            display: inline-block;
        }

        .industrial-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        }

        .btn-print {
            background-color: #166534;
            transition: all 0.2s ease;
            font-weight: 600;
        }
        
        .btn-print:hover {
            background-color: #14532d;
            transform: translateY(-1px);
        }

        .input-field {
            border: 1.5px solid #cbd5e1;
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
            outline: none;
        }

        .label-text {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.025em;
        }

        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .text-above, .text-below {
            font-weight: 700;
            color: #1e2937;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Full Background Watermark - Banyak & Kecil */
        .bg-watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.065;
        }

        .bg-watermark span {
            position: absolute;
            font-size: 11px;
            font-weight: 900;
            color: #1e3a8a;
            white-space: nowrap;
            transform: rotate(-20deg);
            letter-spacing: 1.5px;
            user-select: none;
        }

        .footer {
            font-size: 0.75rem;
            color: #64748b;
            position: relative;
            z-index: 10;
        }

        @media print {
            @page {
                size: auto;
                margin: 8mm;
            }

            body * {
                visibility: hidden;
            }
            
            #print-area, #print-area * {
                visibility: visible;
            }
            
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .qr-container {
                padding: 8px !important;
                border: 1.5px solid #1e3a8a !important;
            }

            #qrcode canvas {
                width: 155px !important;
                height: 155px !important;
            }

            .text-above, .text-below {
                font-size: 11px !important;
                margin: 2px 0 !important;
            }

            .no-print, .bg-watermark {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-100">
    
    <!-- Full Background Watermark Team C Conveyor (banyak & kecil) -->
    <div class="bg-watermark" id="bgWatermark"></div>

    <div class="max-w-5xl mx-auto p-6 relative z-10">
        
        <!-- Header Industrial -->
        <div class="industrial-header rounded-3xl px-8 py-6 mb-8 text-white">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-display tracking-tight">QR CODE</h1>
                    <p class="text-blue-200 mt-1 text-sm font-medium">TIM C CONVEYOR</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="px-4 py-2 bg-white/10 backdrop-blur-sm rounded-2xl flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-industry"></i>
                        <span class="font-semibold">Team C</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Form Input -->
            <div class="lg:col-span-5 section-card rounded-3xl p-7">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-9 h-9 bg-blue-900 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-edit text-white text-lg"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-xl text-slate-800">Input Data</h2>
                        <p class="text-xs text-slate-500 -mt-0.5">Isi data untuk QR Code</p>
                    </div>
                </div>

                <!-- Input Teks (Lebih tinggi + kosong) -->
                <div class="mb-6">
                    <label class="label-text block mb-1.5">INPUT TEKS</label>
                    <input id="inputTeks" type="text" 
                           class="input-field w-full px-4 py-[17px] rounded-2xl text-lg font-semibold bg-white"
                           placeholder="ops........." oninput="generateQR()">
                </div>

                <!-- Teks di Atas QR (Kosong) -->
                <div class="mb-5">
                    <label class="label-text block mb-1.5">TEKS DI ATAS QR</label>
                    <input id="teksAtas" type="text" 
                           class="input-field w-full px-4 py-3 rounded-2xl bg-white"
                           placeholder="ops atau missort..." oninput="generateQR()">
                </div>

                <!-- Teks di Bawah QR -->
                <div class="mb-6">
                    <label class="label-text block mb-1.5">TEKS DI BAWAH QR</label>
                    <input id="teksBawah" type="text" 
                           class="input-field w-full px-4 py-3 rounded-2xl bg-white"
                           placeholder="ops atau missort..." oninput="generateQR()">
                </div>

                <!-- Upload Logo -->
                <div>
                    <label class="label-text block mb-2">LOGO DI TENGAH QR (OPSIONAL)</label>
                    
                    <div class="flex gap-3">
                        <label class="flex-1 cursor-pointer">
                            <div class="border-2 border-dashed border-slate-300 hover:border-blue-900 transition-colors rounded-2xl px-4 py-4 text-center bg-slate-50">
                                <div class="flex flex-col items-center">
                                    <i class="fa-solid fa-upload text-slate-400 text-lg mb-1"></i>
                                    <span class="text-sm font-medium text-slate-600">Upload Logo</span>
                                </div>
                            </div>
                            <input id="logoInput" type="file" accept="image/*" class="hidden" onchange="handleLogoUpload(event)">
                        </label>
                        
                        <button onclick="removeLogo()" 
                                class="px-5 border-2 border-slate-300 hover:bg-slate-100 rounded-2xl text-slate-600 flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-trash text-sm"></i>
                        </button>
                    </div>
                    
                    <div id="logoStatus" class="hidden mt-2.5 px-3 py-2 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-2xl text-xs flex items-center gap-2">
                        <i class="fa-solid fa-check-circle"></i>
                        <span id="logoFileName" class="font-medium"></span>
                    </div>
                </div>
            </div>

            <!-- Preview -->
            <div class="lg:col-span-7 section-card rounded-3xl p-7">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-blue-900 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-eye text-white text-lg"></i>
                        </div>
                        <div>
                            <h2 class="font-bold text-xl text-slate-800">Preview</h2>
                            <p class="text-xs text-slate-500 -mt-0.5">Error Correction: <span class="font-bold text-blue-900">HIGH (H)</span></p>
                        </div>
                    </div>
                </div>

                <!-- Preview Area -->
                <div class="flex justify-center items-center min-h-[360px] bg-white rounded-3xl p-8 border border-slate-200" id="previewContainer">
                    <div id="print-area">
                        <div class="qr-wrapper" id="qrWrapper">
                            
                            <!-- Teks Atas -->
                            <div id="textAbove" class="text-above text-[15px] hidden px-4"></div>
                            
                            <!-- QR Code -->
                            <div class="qr-container">
                                <div id="qrcode"></div>
                            </div>
                            
                            <!-- Teks Bawah -->
                            <div id="textBelow" class="text-below text-[15px] hidden px-4"></div>
                            
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="printLabel()" 
                            class="btn-print col-span-1 text-white py-4 rounded-2xl flex items-center justify-center gap-3 text-base shadow-lg active:scale-[0.985]">
                        <i class="fa-solid fa-print text-xl"></i>
                        <span class="font-bold tracking-wide">PRINT LABEL</span>
                    </button>
                    
                    <button onclick="downloadQR()" 
                            class="col-span-1 bg-white border-2 border-slate-300 hover:bg-slate-50 text-slate-700 font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 transition-colors active:scale-[0.985]">
                        <i class="fa-solid fa-download"></i>
                        <span>Download PNG</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="footer">© by Fajar</p>
        </div>
    </div>

    <script>
        let qrcodeInstance = null;
        let logoImage = null;

        // Buat full background watermark (banyak & kecil)
        function createBackgroundWatermark() {
            const container = document.getElementById('bgWatermark');
            const text = "TEAM C CONVEYOR";
            const rows = 20;
            const cols = 14;

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const span = document.createElement('span');
                    span.textContent = text;
                    
                    // Posisi grid + sedikit acak
                    const top = (i * 6) + (Math.random() * 2.5);
                    const left = (j * 8) + (Math.random() * 3);
                    
                    span.style.top = `${top}%`;
                    span.style.left = `${left}%`;
                    
                    container.appendChild(span);
                }
            }
        }

        function generateQR() {
            const inputTeks = document.getElementById('inputTeks').value.trim();
            if (!inputTeks) {
                clearQR();
                return;
            }

            const container = document.getElementById('qrcode');
            container.innerHTML = '';

            qrcodeInstance = new QRCode(container, {
                text: inputTeks,
                width: 230,
                height: 230,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            updateTextLabels();

            setTimeout(() => {
                if (logoImage) {
                    addLogoToQR();
                }
            }, 120);
        }

        function updateTextLabels() {
            const textAbove = document.getElementById('teksAtas').value.trim();
            const textBelow = document.getElementById('teksBawah').value.trim();

            const aboveEl = document.getElementById('textAbove');
            const belowEl = document.getElementById('textBelow');

            if (textAbove) {
                aboveEl.textContent = textAbove;
                aboveEl.classList.remove('hidden');
            } else {
                aboveEl.classList.add('hidden');
            }

            if (textBelow) {
                belowEl.textContent = textBelow;
                belowEl.classList.remove('hidden');
            } else {
                belowEl.classList.add('hidden');
            }
        }

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                logoImage = new Image();
                logoImage.onload = function() {
                    document.getElementById('logoStatus').classList.remove('hidden');
                    document.getElementById('logoFileName').textContent = file.name.length > 22 
                        ? file.name.substring(0, 19) + '...' 
                        : file.name;

                    const inputTeks = document.getElementById('inputTeks').value.trim();
                    if (inputTeks) generateQR();
                };
                logoImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addLogoToQR() {
            if (!logoImage || !qrcodeInstance) return;

            const qrCanvas = document.querySelector('#qrcode canvas');
            if (!qrCanvas) return;

            const ctx = qrCanvas.getContext('2d');
            const qrSize = qrCanvas.width;
            const logoSize = qrSize * 0.17;

            const x = (qrSize - logoSize) / 2;
            const y = (qrSize - logoSize) / 2;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x - 5, y - 5, logoSize + 10, logoSize + 10);

            ctx.drawImage(logoImage, x, y, logoSize, logoSize);
        }

        function removeLogo() {
            logoImage = null;
            document.getElementById('logoStatus').classList.add('hidden');
            document.getElementById('logoInput').value = '';

            const inputTeks = document.getElementById('inputTeks').value.trim();
            if (inputTeks) generateQR();
        }

        function clearQR() {
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('textAbove').classList.add('hidden');
            document.getElementById('textBelow').classList.add('hidden');
        }

        function printLabel() {
            const inputTeks = document.getElementById('inputTeks').value.trim();
            if (!inputTeks) {
                alert("Mohon isi Input Teks terlebih dahulu!");
                return;
            }
            window.print();
        }

        function downloadQR() {
            const inputTeks = document.getElementById('inputTeks').value.trim();
            if (!inputTeks) {
                alert("Mohon isi Input Teks terlebih dahulu!");
                return;
            }

            const qrCanvas = document.querySelector('#qrcode canvas');
            if (!qrCanvas) return;

            const finalCanvas = document.createElement('canvas');
            const ctx = finalCanvas.getContext('2d');

            const textAbove = document.getElementById('teksAtas').value.trim();
            const textBelow = document.getElementById('teksBawah').value.trim();

            const padding = 24;
            let totalHeight = qrCanvas.height + padding * 2;

            if (textAbove) totalHeight += 32;
            if (textBelow) totalHeight += 32;

            finalCanvas.width = qrCanvas.width + padding * 2;
            finalCanvas.height = totalHeight;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

            let currentY = padding;

            if (textAbove) {
                ctx.fillStyle = "#1e2937";
                ctx.font = "bold 17px Inter, system-ui, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(textAbove, finalCanvas.width / 2, currentY + 20);
                currentY += 36;
            }

            ctx.drawImage(qrCanvas, padding, currentY);

            if (textBelow) {
                ctx.fillStyle = "#1e2937";
                ctx.font = "bold 16px Inter, system-ui, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(textBelow, finalCanvas.width / 2, currentY + qrCanvas.height + 24);
            }

            const link = document.createElement('a');
            link.download = `QR_${inputTeks}.png`;
            link.href = finalCanvas.toDataURL('image/png');
            link.click();
        }

        function init() {
            // Buat watermark background penuh (banyak & kecil)
            createBackgroundWatermark();

            // Semua input dibiarkan kosong, hanya placeholder
            // Tidak ada value default

            // Event listener
            const inputs = ['inputTeks', 'teksAtas', 'teksBawah'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', () => {
                        if (document.getElementById('inputTeks').value.trim()) {
                            generateQR();
                        }
                    });
                }
            });

            console.log('%c[QR Inventory] Full page watermark + input kosong siap', 'color:#64748b');
        }

        window.onload = init;
    </script>
</body>
</html>
